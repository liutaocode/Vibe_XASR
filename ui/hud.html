<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe IME — 悬浮听写浮层</title>
<link rel="stylesheet" href="assets/tokens.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  .stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

  /* ---------------- 仿 macOS 桌面 ---------------- */
  .desktop {
    position: absolute; inset: 0;
    background:
      radial-gradient(1100px 800px at 78% 8%, rgba(124,92,255,0.30), transparent 55%),
      radial-gradient(900px 700px at 12% 96%, rgba(56,225,214,0.22), transparent 52%),
      linear-gradient(160deg, #15131f 0%, #0c0c12 60%, #0a0a0f 100%);
  }
  [data-theme="light"] .desktop {
    background:
      radial-gradient(1100px 800px at 78% 8%, rgba(124,92,255,0.22), transparent 55%),
      radial-gradient(900px 700px at 12% 96%, rgba(56,225,214,0.20), transparent 52%),
      linear-gradient(160deg, #eef0fb 0%, #e7e9f3 60%, #eceef6 100%);
  }

  .menubar {
    position: absolute; top: 0; left: 0; right: 0; height: 30px; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; font-size: 13px; color: var(--text);
    background: rgba(20,20,28,0.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.6); backdrop-filter: blur(20px) saturate(1.6);
    border-bottom: 1px solid var(--inner-stroke);
  }
  [data-theme="light"] .menubar { background: rgba(255,255,255,0.55); }
  .mb-left { display: flex; align-items: center; gap: 16px; }
  .mb-left strong { font-weight: 650; }
  .mb-left span:not(.apple) { color: var(--text-muted); }
  .apple { width: 14px; height: 14px; border-radius: 4px; background: var(--accent); display: inline-block; }
  .mb-right { display: flex; align-items: center; gap: 14px; color: var(--text-muted); font-size: 12px; }
  .mb-glyph { font-size: 13px; transition: filter .2s; }
  .mb-glyph.live { animation: glyphpulse 1.2s ease-in-out infinite; }
  @keyframes glyphpulse { 50% { opacity: .5; } }

  /* editor window */
  .editor-win {
    position: absolute; top: 88px; left: 50%; transform: translateX(-50%);
    width: min(720px, 80vw); border-radius: var(--r-panel); overflow: hidden;
    background: var(--surface); border: 1px solid var(--hairline);
    box-shadow: var(--shadow-float);
  }
  .ew-bar { height: 38px; display: flex; align-items: center; gap: 8px; padding: 0 14px;
    background: var(--surface-2); border-bottom: 1px solid var(--hairline); position: relative; }
  .tl { width: 12px; height: 12px; border-radius: 50%; }
  .tl.r { background: #FF5F57; } .tl.y { background: #FEBC2E; } .tl.g { background: #28C840; }
  .ew-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--text-muted); }
  .ew-body { display: flex; padding: 16px 0; min-height: 220px; font-size: 14px; line-height: 1.9; }
  .gutter { width: 44px; flex: none; text-align: right; padding-right: 14px; color: var(--text-muted); opacity: .5; }
  .code { flex: 1; padding-right: 20px; color: var(--text); }
  .code .kw { color: #C792EA; } .code .str { color: #C3E88D; } .code .cmt { color: var(--text-muted); opacity: .65; }
  .code .blank { height: 1.9em; }
  .prompt-line { color: var(--text); min-height: 1.9em; }
  .prompt-line .t { white-space: pre-wrap; }
  .cursor { color: var(--accent-b); animation: blink 1s step-end infinite; }
  .cursor.flash { animation: cursorflash .6s ease; }
  @keyframes cursorflash { 0%{ color: var(--success); transform: scale(1.4);} 100%{ color: var(--accent-b);} }
  @keyframes blink { 50% { opacity: 0; } }

  .dock {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 4;
    display: flex; gap: 10px; padding: 8px 12px; border-radius: 18px;
    background: var(--glass); border: 1px solid var(--inner-stroke);
    -webkit-backdrop-filter: blur(24px) saturate(1.5); backdrop-filter: blur(24px) saturate(1.5);
    box-shadow: var(--shadow-float);
  }
  .dock-ico { width: 44px; height: 44px; border-radius: 12px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.25); }

  /* ---------------- HUD ---------------- */
  .hud-anchor {
    position: absolute; left: 50%; bottom: 86px; transform: translateX(-50%);
    z-index: 50; pointer-events: none;
  }
  .hud-anchor.anchor-radical { bottom: 50%; transform: translate(-50%, 50%); }

  .hud {
    pointer-events: auto;
    display: flex; align-items: center; gap: var(--s3);
    background: var(--glass);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.6);
    backdrop-filter: blur(var(--glass-blur)) saturate(1.6);
    border: 1px solid var(--inner-stroke);
    box-shadow: var(--shadow-float);
    transition: opacity 150ms var(--ease-out), transform 150ms var(--ease-out);
  }
  .hud.out { opacity: 0; transform: translateY(10px) scale(0.98); pointer-events: none; }
  .hud.in { opacity: 1; transform: translateY(0) scale(1); }
  .hud.phase-finalizing, .hud.phase-done { animation: bounceIn 120ms var(--ease-spring); }
  @keyframes bounceIn { 0%{ transform: scale(0.96);} 60%{ transform: scale(1.02);} 100%{ transform: scale(1);} }

  /* compact + expanded share capsule */
  .hud-compact, .hud-expanded {
    border-radius: var(--r-pill);
    padding: 12px 16px; min-width: 280px; max-width: 620px;
  }
  .hud-expanded { border-radius: 22px; flex-direction: row; align-items: flex-start; padding: 14px 18px; max-width: 560px; }

  .hud-left { flex: none; display: flex; align-items: center; }
  .orb-wrap { position: relative; width: 40px; height: 40px; display: grid; place-items: center; }
  .orb-wf { position: absolute; inset: 0; display: grid; place-items: center; }

  /* orb */
  .orb { width: 28px; height: 28px; border-radius: 50%; position: relative;
    background: var(--accent); box-shadow: 0 0 0 0 rgba(124,92,255,0.5);
    display: grid; place-items: center; transition: background .2s, box-shadow .2s; }
  .orb .pulse { position: absolute; inset: 0; border-radius: 50%; background: var(--accent); }
  .orb-live { animation: breathe 1.2s ease-in-out infinite; }
  @keyframes breathe {
    0%,100% { box-shadow: 0 0 0 0 rgba(124,92,255,0.5), 0 0 18px rgba(124,92,255,0.6); }
    50% { box-shadow: 0 0 0 7px rgba(124,92,255,0.0), 0 0 26px rgba(56,225,214,0.7); }
  }
  .orb-done { background: var(--success); box-shadow: 0 0 20px rgba(69,212,131,0.6); }
  .orb-cancel { background: var(--error); box-shadow: 0 0 20px rgba(255,92,102,0.55); }
  .orb-error { background: var(--error); box-shadow: 0 0 22px rgba(255,92,102,0.6); }
  .orb .glyph { color: #fff; font-size: 15px; font-weight: 700; line-height: 1; }
  .orb-error .glyph { font-size: 14px; }
  .orb-big { width: 52px; height: 52px; }
  .orb-big .glyph { font-size: 24px; }

  /* waveform */
  .wf { display: flex; align-items: center; gap: 2px; height: 26px; width: 40px; justify-content: center; }
  .wf i { width: 2px; height: 100%; border-radius: 2px; background: var(--accent-a);
    background: linear-gradient(180deg, var(--accent-a), var(--accent-b));
    transform-origin: center; transform: scaleY(0.1); transition: opacity .2s; }
  .wf-big { height: 150px; width: 150px; gap: 3px; }
  .wf-big i { width: 3px; }

  /* mid text */
  .hud-mid { flex: 1; min-width: 0; overflow: hidden; }
  .hud-mid .line { display: flex; align-items: baseline; white-space: nowrap; overflow: hidden;
    font-size: 14px; color: var(--text); }
  .hud-mid.mid-exp .line { white-space: normal; }
  .t-content { overflow: hidden; text-overflow: ellipsis; }
  .hud-compact .line { max-width: 460px; }
  .caret { color: var(--accent-b); animation: blink 1s step-end infinite; margin-left: 1px; }
  .dots { color: var(--text-muted); margin-left: 2px; letter-spacing: 2px; }
  .hud-mid .line:empty::before, .phase-empty .t-content:empty { color: var(--text-muted); }
  .phase-empty .hud-mid .t-content::before { content: "在听…"; color: var(--text-muted); }

  .exp-bar { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .exp-btn { font: inherit; font-family: var(--font-ui); font-size: 12px; cursor: pointer;
    color: var(--text); background: var(--surface-2); border: 1px solid var(--hairline);
    padding: 5px 12px; border-radius: var(--r-pill); }
  .exp-btn:hover { border-color: var(--hairline-strong); }
  .exp-hint { font-size: 11px; color: var(--text-muted); }

  /* right status */
  .hud-right { flex: none; display: flex; align-items: center; }
  .timer { font-size: 12.5px; color: var(--text-muted);
    background: var(--surface-2); padding: 4px 9px; border-radius: var(--r-pill); }
  .ok { font-size: 12.5px; color: var(--success); font-weight: 600; }
  .cancel-t { font-size: 12.5px; color: var(--error); font-weight: 600; }
  .goset { font: inherit; font-family: var(--font-ui); font-size: 12.5px; cursor: pointer;
    color: #fff; background: var(--error); border: none; padding: 6px 12px; border-radius: var(--r-pill); }

  /* error block */
  .err-block { line-height: 1.35; }
  .err-title { font-size: 13.5px; font-weight: 650; color: var(--text); font-family: var(--font-ui); }
  .err-reason { font-size: 12px; color: var(--text-muted); font-family: var(--font-ui); margin-top: 2px; }
  .phase-cancel { box-shadow: var(--shadow-float), 0 0 0 2px var(--error); }

  /* ---- radical form ---- */
  .hud-radical {
    flex-direction: column; gap: 18px; align-items: center;
    padding: 36px 40px; border-radius: 28px; min-width: 320px; max-width: 460px;
    background: var(--glass);
    box-shadow: var(--shadow-float), 0 0 80px rgba(124,92,255,0.25);
  }
  .rad-orb { position: relative; width: 150px; height: 150px; display: grid; place-items: center; }
  .rad-ring { position: absolute; inset: 0; display: grid; place-items: center; }
  .rad-text { text-align: center; font-size: 16px; color: var(--text); min-height: 24px;
    max-width: 360px; line-height: 1.5; text-wrap: pretty; }
  .rad-status { min-height: 18px; }
  .hud-radical .timer { font-size: 13px; }

  /* ---------------- controls ---------------- */
  .controls {
    position: fixed; top: 42px; left: 50%; transform: translateX(-50%); z-index: 200;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
    padding: 8px 10px; border-radius: var(--r-pill);
    background: var(--glass); border: 1px solid var(--inner-stroke);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.5); backdrop-filter: blur(var(--glass-blur)) saturate(1.5);
    box-shadow: var(--shadow-float); max-width: 94vw;
  }
  .ctl-group { display: flex; align-items: center; gap: 10px; }
  .ptt { font: inherit; font-family: var(--font-ui); font-weight: 600; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; color: #fff; border: none;
    background: var(--accent); padding: 9px 18px; border-radius: var(--r-pill);
    box-shadow: 0 4px 16px rgba(124,92,255,0.4); user-select: none; touch-action: none;
    transition: transform .12s var(--ease-spring), box-shadow .15s; }
  .ptt:active, .ptt-on { transform: scale(0.97); box-shadow: 0 0 0 4px rgba(124,92,255,0.25), 0 4px 16px rgba(124,92,255,0.5); }
  .ptt-dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; }
  .ptt-on .ptt-dot { animation: blink 0.8s step-end infinite; }
  .ctl-hint { font-size: 11.5px; color: var(--text-muted); }
  .ctl-hint kbd { font-family: var(--font-mono); font-size: 10.5px; background: var(--surface-2);
    border: 1px solid var(--hairline); border-radius: 5px; padding: 1px 5px; color: var(--text); }

  .ctl-sep { width: 1px; height: 22px; background: var(--hairline); }

  .seg { display: flex; gap: 2px; padding: 3px; border-radius: var(--r-pill); background: var(--surface-2); }
  .seg button { font: inherit; font-family: var(--font-ui); font-size: 12px; cursor: pointer;
    border: none; background: transparent; color: var(--text-muted); padding: 5px 11px; border-radius: var(--r-pill);
    transition: color .15s, background .15s; }
  .seg button.on { background: var(--surface); color: var(--text); box-shadow: var(--shadow-card); }
  [data-theme="dark"] .seg button.on { background: #34343f; }

  .err-btn { font: inherit; font-family: var(--font-ui); font-size: 12px; cursor: pointer;
    color: var(--error); background: transparent; border: 1px solid var(--hairline);
    padding: 6px 12px; border-radius: var(--r-pill); }
  .err-btn:hover { border-color: var(--error); }

  @media (max-width: 720px) {
    .ctl-hint { display: none; }
    .editor-win { width: 92vw; }
  }
</style>
</head>
